version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kanban_db
    environment:
      POSTGRES_USER: kanban_user
      POSTGRES_PASSWORD: kanban_password
      POSTGRES_DB: kanban_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kanban-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  kanban-network:
    driver: bridge
