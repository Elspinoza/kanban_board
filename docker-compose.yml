version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kanban_db
    environment:
      POSTGRES_USER: kanban_user
      POSTGRES_PASSWORD: kanban_password
      POSTGRES_DB: kanban_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kanban-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/kanban_db
      - SPRING_DATASOURCE_USERNAME=kanban_user
      - SPRING_DATASOURCE_PASSWORD=kanban_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - kanban-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kanban-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  kanban-network:
    driver: bridge
