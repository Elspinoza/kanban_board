name: Build and Test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kanban_db
          POSTGRES_USER: kanban_user
          POSTGRES_PASSWORD: kanban_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build and Test Backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/kanban_db
          SPRING_DATASOURCE_USERNAME: kanban_user
          SPRING_DATASOURCE_PASSWORD: kanban_password
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || '404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970' }}
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package

          
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  frontend-build:
    name: Frontend CI (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Build Frontend
        run: |
          cd frontend
          npm run build -- --configuration=production
          
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser

  docker-verify:
    name: Docker Connectivity Check
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Docker Compose
        run: docker compose config

