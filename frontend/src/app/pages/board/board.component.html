<div class="h-full flex flex-col animate-fade-in text-base-content">
  
  <!-- Board Header: Editorial Architectural Tone -->
  <div class="flex items-end justify-between mb-20 px-4">
    <div class="max-w-xl">
      <nav class="flex items-center gap-2 text-[10px] font-black text-primary uppercase tracking-[0.4em] mb-4">
        <span>ARCHIVE</span>
        <span class="w-1.5 h-1.5 rounded-full bg-success"></span>
        <span class="opacity-50 text-base-content">STRATÉGIE Q2</span>
      </nav>
      <h2 class="text-6xl font-headline font-black tracking-tighter text-base-content leading-none">Flux Indigo.</h2>
    </div>
    
    <div class="flex items-center gap-8">
        <!-- Mock Member pile: Architectural Style -->
        <div class="flex -space-x-4">
            <div *ngFor="let i of [1,2,3]" class="w-12 h-12 rounded-lg border-4 border-base-100 bg-base-300 flex items-center justify-center text-[10px] font-black text-base-content/40 shadow-sm hover:z-10 transition-all hover:-translate-y-2">
                <span class="material-symbols-outlined text-base">person</span>
            </div>
            <div class="w-12 h-12 rounded-lg border-4 border-base-100 btn-signature text-[10px] font-black flex items-center justify-center text-white shadow-noir">+5</div>
        </div>

        <button (click)="showModal = true" class="flex items-center gap-4 px-10 py-4 btn-signature rounded-md font-black text-[10px] uppercase tracking-[0.3em] shadow-noir active:scale-95 transition-all">
          <span class="material-symbols-outlined text-sm">add</span>
          <span>Nouvelle Unité</span>
        </button>
    </div>
  </div>

  <app-task-modal *ngIf="showModal" (close)="showModal = false" (taskCreated)="loadTasks()"></app-task-modal>

  <!-- Columns Grid: Editorial Tonal Layering -->
  <div class="flex-1 flex gap-12 overflow-x-auto pb-12 items-start scrollbar-hide px-4" cdkDropListGroup>
    
    <!-- Column: Surface Container Low (Indigo Base) -->
    <div *ngFor="let board of boards" class="bg-base-200/40 rounded-lg w-[360px] flex-shrink-0 flex flex-col max-h-full transition-all group/column hover:bg-base-200/60 pb-8">
      
      <!-- Column Header -->
      <div class="p-8 flex items-center justify-between">
        <div class="flex items-center gap-5">
          <div class="w-2 h-2 rounded-full shadow-lg" [ngClass]="{
            'bg-error': board.id === 'TODO',
            'bg-primary': board.id === 'IN_PROGRESS',
            'bg-warning': board.id === 'REVIEW',
            'bg-success': board.id === 'DONE'
          }"></div>
          <h3 class="font-black text-[11px] font-headline uppercase tracking-[0.4em] text-base-content opacity-30">{{ board.title }}</h3>
        </div>
        <span class="text-[10px] font-black text-base-content/10 group-hover/column:text-primary transition-all">{{ board.tasks.length }} DATA</span>
      </div>
      
      <!-- Task List Area -->
      <div 
        class="kanban-column flex-1 overflow-y-auto px-6 pb-2 flex flex-col gap-6 min-h-[500px] scrollbar-hide"
        [id]="board.id"
        cdkDropList
        [cdkDropListData]="board.tasks"
        (cdkDropListDropped)="drop($event)">
        
        <!-- Task Card: Surface Container High (The Architectural Module) -->
        <div 
          *ngFor="let task of board.tasks" 
          class="bg-base-300 p-8 rounded-lg transition-all cursor-grab active:cursor-grabbing hover:-translate-y-2 relative shadow-sm hover:shadow-noir group"
          cdkDrag>
          
          <!-- Editorial Accent Bar (Left side per spec fallback pattern or card accent) -->
          <div class="absolute left-0 top-6 bottom-6 w-1 rounded-r-full group-hover:w-1.5 transition-all" [ngClass]="{
            'bg-error': task.priority === 'URGENT',
            'bg-primary': task.priority === 'HIGH',
            'bg-warning': task.priority === 'MEDIUM',
            'bg-success': task.priority === 'LOW'
          }"></div>

          <div class="flex items-center gap-3 mb-6">
            <span class="text-[9px] font-black px-2.5 py-1 rounded-sm uppercase tracking-[0.2em] bg-base-content/5 text-base-content/40 italic">
              {{ task.priority }} REFERENCE
            </span>
          </div>

          <h4 class="font-black text-xl text-base-content leading-tight mb-4 tracking-tight group-hover:text-primary transition-colors">{{ task.title }}</h4>
          <p class="text-xs text-base-content/30 line-clamp-3 mb-8 font-medium leading-[1.8] italic">{{ task.description }}</p>
          
          <div class="flex items-center justify-between pt-6 mt-auto border-t border-base-content/5">
            <div class="flex items-center gap-3 text-base-content/20 group-hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-base">timer</span>
              <span class="text-[9px] font-black uppercase tracking-widest">{{ task.deadline | date:'MMM d' }}</span>
            </div>

            <div class="avatar placeholder" *ngIf="task.assignee">
              <div class="bg-base-200 text-base-content/40 rounded-md w-10 shadow-inner group-hover:bg-primary group-hover:text-white transition-all">
                <span class="text-[10px] font-black">{{ task.assignee.email.charAt(0) | uppercase}}</span>
              </div>
            </div>
          </div>

          <div *cdkDragPlaceholder class="cdk-drag-placeholder rounded-lg bg-base-100 opacity-20 border-2 border-dashed border-primary"></div>
        </div>
        
        <!-- Add Task inline action (Ghost Style per spec) -->
        <button (click)="showModal = true" class="mt-4 p-8 w-full bg-transparent border-2 border-dashed border-base-content/5 rounded-lg text-base-content/20 hover:text-primary hover:border-primary/20 hover:bg-primary/5 transition-all flex flex-col items-center justify-center gap-3 font-black text-[10px] uppercase tracking-[0.3em]">
            <span class="material-symbols-outlined text-2xl opacity-20">add_circle</span>
            <span>Initialiser Nouveau Segment</span>
        </button>

      </div>
    </div>

    <!-- Architectural Layout Asymmetry -->
    <div class="w-24 h-[600px] flex-shrink-0 flex items-center justify-center opacity-10 hover:opacity-100 transition-all duration-700">
        <div class="w-px h-full bg-gradient-to-b from-transparent via-primary/20 to-transparent flex flex-col items-center justify-center">
            <button class="w-14 h-14 bg-base-200 rounded-lg shadow-noir flex items-center justify-center hover:btn-signature hover:rotate-90 transition-all group">
                <span class="material-symbols-outlined text-3xl opacity-20 group-hover:opacity-100">add</span>
            </button>
        </div>
    </div>
    
  </div>
</div>
