<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-8">
  <!-- Overlay: Atmospheric Blur -->
  <div class="fixed inset-0 bg-on-surface/40 backdrop-blur-xl" (click)="close.emit()"></div>
  
  <!-- Modal Content: The Fluid Architect Aesthetic -->
  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" scrollbar-hide
    class="bg-surface w-full max-w-6xl rounded-md shadow-2xl relative z-10 flex flex-col lg:flex-row max-h-[92vh] overflow-hidden animate-fade-in border-none">
    
    <!-- Left Interaction Canvas: Primary Data -->
    <div class="flex-1 p-10 lg:p-16 overflow-y-auto scrollbar-hide">
      <!-- Breadcrumbs: Pure Editorial -->
      <nav class="flex items-center gap-3 text-[9px] font-black text-on-surface-variant uppercase tracking-[0.3em] mb-12 opacity-40">
        <span>Archives</span>
        <span class="w-1 h-[1px] bg-on-surface-variant opacity-30"></span>
        <span>Système Tactique</span>
        <span class="w-1 h-[1px] bg-on-surface-variant opacity-30"></span>
        <span class="text-primary opacity-100 font-black">Planification</span>
      </nav>

      <h1 class="text-5xl lg:text-6xl font-black font-headline tracking-tighter text-on-surface mb-16 leading-none">Définir l'Objectif</h1>

      <div class="space-y-12">
        <!-- Title Field: Minimal Density -->
        <div class="space-y-4">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant opacity-50">Intitulé de la Tâche</label>
          <input 
            type="text" 
            formControlName="title"
            placeholder="Saisissez la vision ici..." 
            class="w-full px-8 py-5 bg-surface-container-low border-none rounded-md focus:ring-4 focus:ring-primary/5 transition-all text-on-surface placeholder:text-on-surface-variant/30 font-black text-2xl tracking-tight" />
        </div>

        <!-- Description: Structure over lines -->
        <div class="space-y-4">
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant opacity-50">Profondeur & Détails</label>
          <div class="rounded-md overflow-hidden bg-surface-container-low transition-all focus-within:ring-4 focus-within:ring-primary/5">
            <!-- Mock Editor Sidebar (Stitch Style) -->
            <div class="flex items-center gap-2 p-3 bg-on-surface/5 flex-wrap">
              <button type="button" class="w-8 h-8 rounded-md hover:bg-surface-container-lowest flex items-center justify-center text-on-surface-variant hover:text-primary transition-all"><span class="material-symbols-outlined text-lg">format_bold</span></button>
              <button type="button" class="w-8 h-8 rounded-md hover:bg-surface-container-lowest flex items-center justify-center text-on-surface-variant hover:text-primary transition-all"><span class="material-symbols-outlined text-lg">format_list_bulleted</span></button>
              <span class="w-px h-4 bg-on-surface/10 mx-2"></span>
              <button type="button" class="w-8 h-8 rounded-md hover:bg-surface-container-lowest flex items-center justify-center text-on-surface-variant hover:text-primary transition-all"><span class="material-symbols-outlined text-lg">code</span></button>
            </div>
            <textarea 
              formControlName="description"
              placeholder="Élargissez le contexte de cette mission..." 
              rows="8"
              class="w-full px-8 py-6 border-none focus:ring-0 text-on-surface bg-transparent font-medium resize-none text-lg leading-relaxed placeholder:text-on-surface-variant/20"></textarea>
          </div>
        </div>

        <!-- Submission Strategy -->
        <div class="pt-10 flex items-center gap-10">
          <button 
            type="submit" 
            [disabled]="taskForm.invalid || isLoading"
            class="px-12 py-5 bg-gradient-to-br from-primary-container to-primary text-on-primary rounded-md font-black text-[10px] uppercase tracking-[0.3em] shadow-2xl shadow-primary/30 hover:scale-105 active:scale-95 transition-all flex items-center gap-4">
              <span *ngIf="isLoading" class="loading loading-spinner loading-xs mr-2"></span>
              Synchroniser
          </button>
          <button 
            type="button" 
            (click)="close.emit()" 
            class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant hover:text-on-surface transition-colors">
            Révoquer
          </button>
        </div>
      </div>
    </div>

    <!-- Right Configuration Panel: Tonal Separation -->
    <div class="w-full lg:w-[400px] bg-surface-container-low p-10 lg:p-16 flex flex-col gap-10 overflow-y-auto scrollbar-hide">
      
      <div class="space-y-4">
        <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-[0.2em] opacity-40">Statut Actuel</label>
        <div class="relative group">
          <select 
            formControlName="status" 
            class="w-full pl-6 pr-12 py-5 bg-surface-container-lowest border-none rounded-md text-[11px] font-black text-on-surface appearance-none cursor-pointer focus:ring-4 focus:ring-primary/5 transition-all shadow-sm">
            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
          <span class="absolute right-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant opacity-30 pointer-events-none">expand_more</span>
        </div>
      </div>

      <div class="space-y-4">
        <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-[0.2em] opacity-40">Priorité Stratégique</label>
        <div class="relative group">
          <select 
            formControlName="priority" 
            class="w-full pl-6 pr-12 py-5 bg-surface-container-lowest border-none rounded-md text-[11px] font-black text-on-surface appearance-none cursor-pointer focus:ring-4 focus:ring-primary/5 transition-all shadow-sm">
            <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
          </select>
          <span class="absolute right-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant opacity-30 pointer-events-none">expand_more</span>
        </div>
      </div>

      <div class="space-y-4">
        <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-[0.2em] opacity-40">Responsable</label>
        <div class="relative group">
          <select 
            formControlName="assigneeId" 
            class="w-full pl-14 pr-12 py-5 bg-surface-container-lowest border-none rounded-md text-[11px] font-black text-on-surface appearance-none cursor-pointer focus:ring-4 focus:ring-primary/5 transition-all shadow-sm">
            <option [value]="null">Non Assigné</option>
            <option *ngFor="let user of users" [value]="user.id">{{ user.firstName }} {{ user.lastName }}</option>
          </select>
          <div class="absolute left-5 top-1/2 -translate-y-1/2 w-7 h-7 rounded-md bg-primary-container text-on-primary flex items-center justify-center font-black text-[10px] pointer-events-none shadow-sm">
            {{ taskForm.get('assigneeId')?.value ? 'ID' : '?' }}
          </div>
          <span class="absolute right-6 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant opacity-30 pointer-events-none">expand_more</span>
        </div>
      </div>

      <!-- Chronology Grid -->
      <div class="space-y-8 mt-4">
        <div class="space-y-4">
          <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-[0.2em] opacity-40">Échéance Finale</label>
          <input 
            type="date" 
            formControlName="deadline" 
            class="w-full px-6 py-5 bg-surface-container-lowest border-none rounded-md text-[11px] font-black text-on-surface focus:ring-4 focus:ring-primary/5 shadow-inner" />
        </div>
      </div>

      <!-- Atmospheric Asset Preview -->
      <div class="mt-auto hidden lg:block pt-10">
        <label class="text-[10px] font-black text-on-surface-variant uppercase tracking-[0.2em] opacity-40 mb-6 block">Vision Visuelle</label>
        <div class="w-full aspect-[4/3] bg-surface-container-lowest rounded-md relative overflow-hidden group shadow-premium hover:shadow-2xl transition-all duration-700">
            <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&q=80&w=600" alt="Vision" class="absolute inset-0 w-full h-full object-cover grayscale opacity-20 group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-105 transition-all duration-[1.5s]">
            <div class="absolute inset-0 bg-gradient-to-t from-on-surface/20 to-transparent"></div>
            <div class="absolute bottom-6 left-6 right-6">
                <span class="text-[8px] font-black text-white uppercase tracking-[0.4em] opacity-80">Reference Grid Alpha</span>
            </div>
        </div>
      </div>

    </div>
  </form>
</div>
